services:
  api:
    build: .
    container_name: aqherbal_api
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: aqherbal_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: aqherbal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo_data:
